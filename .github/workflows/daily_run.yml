name: Daily Stock Data Fetcher

on:
  # 手動実行用ボタンを設置
  workflow_dispatch:
  # 定期実行（日本時間のアサ7時＝UTCの前日22時）
  schedule:
    - cron: '3 22 * * *'

jobs:
  run_script:
    runs-on: ubuntu-latest
    
    steps:
    # 1. GitHub上のあなたのコード（main.pyなど）をLinux内に引っ張ってくる（超重要）
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Python環境のセットアップ（エラーの原因だった不要なcache設定を削除）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 必要なライブラリをまとめてインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance matplotlib openpyxl xlrd pyarrow

    # 4. Pythonスクリプトを実行（全件バルクダウンロード）
    - name: Run Python script
      run: python main.py

    # 5. 生成された Parquet ファイルを自動的に GitHub へコミット＆プッシュする
    - name: Commit and Push Parquet file
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # ファイル変化がある場合のみコミットしてプッシュ
        if [ -f daily_stock_data.parquet ]; then
          git add daily_stock_data.parquet
          git diff-index --quiet HEAD || git commit -m "Update daily stock data [skip ci]"
          git push
        else
          echo "Error: daily_stock_data.parquet not found!"
          exit 1
        fi